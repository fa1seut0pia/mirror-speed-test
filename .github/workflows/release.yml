name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_suffix: linux-x64
            ext: ""
          - os: windows-latest
            artifact_suffix: windows-x64
            ext: ".exe"
          - os: macos-latest
            artifact_suffix: macos-x64
            ext: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller certifi

      - name: Write VERSION (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          printf "%s\n" "${GITHUB_REF_NAME}" > VERSION

      - name: Write VERSION (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:GITHUB_REF_NAME | Out-File -FilePath VERSION -Encoding utf8

      - name: Build binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --noconfirm --onefile --name mirror-speed-test --collect-data certifi --add-data "index.html:." --add-data "VERSION:." app.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --name mirror-speed-test --collect-data certifi --add-data "index.html;." --add-data "VERSION;." app.py

      - name: Rename artifact
        shell: bash
        run: |
          mkdir -p release-assets
          src="dist/mirror-speed-test${{ matrix.ext }}"
          dst="release-assets/mirror-speed-test-${{ matrix.artifact_suffix }}${{ matrix.ext }}"
          mv "$src" "$dst"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.artifact_suffix }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          draft: false
          prerelease: false

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=ref,event=tag

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
